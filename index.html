<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monopoly Romania</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(135deg, #1a472a 0%, #0a1f12 100%);
            min-height: 100vh;
            color: white;
            padding: 16px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        input, select {
            width: 100%;
            padding: 16px;
            margin: 16px 0;
            border-radius: 60px;
            border: none;
            font-size: 16px;
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
        }
        button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 16px 32px;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:active { transform: scale(0.98); }
        .turn-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 12px 24px;
            border-radius: 60px;
            text-align: center;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 16px;
        }
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 20px;
            flex: 1;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: #FFD700; }
        .board {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            max-height: 45vh;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .tile {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .tile-number {
            width: 32px;
            height: 32px;
            background: #FFD700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a2e;
            font-size: 12px;
        }
        .tile-name { font-size: 13px; font-weight: bold; flex: 1; }
        .token {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid white;
        }
        .dice-area {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }
        .dice {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .die {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #333;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            border: none;
        }
        .primary { background: linear-gradient(135deg, #FFD700, #FFA500); color: #1a1a2e; }
        .secondary { background: rgba(255,255,255,0.2); color: white; }
        .log {
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            padding: 12px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 11px;
        }
        .log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 2px solid #FFD700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="gameScreen">
            <div class="turn-badge" id="turnText">Joc Pass-and-Play</div>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="currentMoney">1500</div><div>💰 Bani</div></div>
                <div class="stat"><div class="stat-value" id="currentPos">1</div><div>📍 Poziție</div></div>
                <div class="stat"><div class="stat-value" id="currentProps">0</div><div>🏠 Proprietăți</div></div>
            </div>
            
            <div class="board" id="board"></div>
            
            <div class="dice-area">
                <div class="dice">
                    <div class="die" id="die1">⚀</div>
                    <div class="die" id="die2">⚀</div>
                </div>
                <div class="action-buttons">
                    <button class="action-btn primary" id="rollBtn" onclick="rollDice()">🎲 Aruncă Zarul</button>
                    <button class="action-btn secondary" id="endBtn" onclick="endTurn()" disabled>⏭️ Termină Tura</button>
                </div>
                <div class="action-buttons">
                    <button class="action-btn secondary" onclick="resetGame()">🔄 Joc Nou</button>
                </div>
            </div>
            
            <div class="log" id="log"></div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMsg"></p>
            <div id="modalBtns"></div>
        </div>
    </div>

    <script>
        // Game state - Pass and Play version (single device)
        let players = [];
        let currentPlayer = 0;
        let hasRolled = false;
        let currentRoll = 0;
        let gameLog = [];
        
        // Romanian Monopoly board (40 tiles)
        const tiles = [
            "Pornire", "Rahova", "Cufărul Comunității", "Giulești", "Impozit pe Venit",
            "Gara Progresu", "Vitan", "Șansă", "Pantelimon", "Berceni",
            "Închisoare", "Titan", "Uzina Electrică", "Colentina", "Tei",
            "Gara Obor", "B-dul Timișoara", "Cufărul Comunității", "B-dul Brașov", "Drumul Taberei",
            "Parcare Gratuită", "B-dul Carol I", "Șansă", "B-dul Kogălniceanu", "B-dul Eroilor",
            "Gara Basarab", "B-dul Titulescu", "B-dul 1 Mai", "Uzina de Apă", "Calea Dorobanților",
            "Du-te la Închisoare", "Piața Unirii", "Cotroceni", "Cufărul Comunității", "Calea Victoriei",
            "Gara de Nord", "Șansă", "B-dul Magheru", "Taxă de Lux", "B-dul Primăverii"
        ];
        
        const tileColors = [
            "#FFD700", "#955436", "#90EE90", "#955436", "#FF4444",
            "#333", "#ACD9ED", "#87CEEB", "#ACD9ED", "#ACD9ED",
            "#808080", "#E6A8D7", "#CCC", "#E6A8D7", "#E6A8D7",
            "#333", "#FAA61A", "#90EE90", "#FAA61A", "#FAA61A",
            "#FFF", "#ED1B24", "#87CEEB", "#ED1B24", "#ED1B24",
            "#333", "#FFF200", "#FFF200", "#CCC", "#FFF200",
            "#808080", "#1FB25A", "#1FB25A", "#90EE90", "#1FB25A",
            "#333", "#87CEEB", "#0D4C92", "#FF4444", "#0D4C92"
        ];
        
        const tilePrices = [
            0, 60, 0, 60, 200, 200, 100, 0, 100, 120,
            0, 140, 150, 140, 160, 200, 180, 0, 180, 200,
            0, 220, 0, 220, 240, 200, 260, 260, 150, 280,
            0, 300, 300, 0, 320, 200, 0, 350, 100, 400
        ];
        
        // Properties ownership
        let properties = {};
        
        function init() {
            // Setup players
            const numPlayers = prompt("Câți jucători? (2-8)", "4");
            let count = parseInt(numPlayers);
            if (isNaN(count) || count < 2) count = 2;
            if (count > 8) count = 8;
            
            for (let i = 0; i < count; i++) {
                const name = prompt(`Numele jucătorului ${i+1}:`, `Jucător ${i+1}`);
                players.push({
                    id: i,
                    name: name || `Jucător ${i+1}`,
                    color: ["#FF4444", "#4444FF", "#44FF44", "#FFFF44", "#FF44FF", "#FF8844", "#FF88FF", "#44FFFF"][i],
                    money: 1500,
                    position: 0,
                    properties: [],
                    houses: {}
                });
            }
            
            // Initialize properties
            for (let i = 0; i < tiles.length; i++) {
                properties[i] = { owner: null, houses: 0 };
            }
            
            addLog("🎲 Jocul a început!");
            addLog(`👥 Jucători: ${players.map(p => p.name).join(", ")}`);
            addLog(`🎲 Primul jucător: ${players[0].name}`);
            
            renderGame();
        }
        
        function addLog(msg) {
            gameLog.unshift(msg);
            if (gameLog.length > 30) gameLog.pop();
            renderLog();
        }
        
        function renderLog() {
            const logDiv = document.getElementById('log');
            if (logDiv) {
                logDiv.innerHTML = gameLog.map(l => `<div class="log-entry">${l}</div>`).join('');
            }
        }
        
        function renderGame() {
            // Update stats for current player
            const player = players[currentPlayer];
            document.getElementById('currentMoney').innerText = player.money;
            document.getElementById('currentPos').innerText = player.position + 1;
            document.getElementById('currentProps').innerText = player.properties.length;
            document.getElementById('turnText').innerHTML = `🎲 Rândul lui: ${player.name}`;
            
            // Update buttons
            const rollBtn = document.getElementById('rollBtn');
            const endBtn = document.getElementById('endBtn');
            if (!hasRolled) {
                rollBtn.disabled = false;
                endBtn.disabled = true;
            } else {
                rollBtn.disabled = true;
                endBtn.disabled = false;
            }
            
            renderBoard();
        }
        
        function renderBoard() {
            const boardDiv = document.getElementById('board');
            if (!boardDiv) return;
            
            boardDiv.innerHTML = tiles.map((tile, i) => {
                const playersOnTile = players.filter(p => p.position === i);
                const owner = properties[i].owner;
                const ownerName = owner !== null ? players.find(p => p.id === owner)?.name : null;
                
                return `
                    <div class="tile" onclick="showTileInfo(${i})">
                        <div class="tile-number">${i+1}</div>
                        <div style="width:8px; height:40px; background:${tileColors[i]}; border-radius:4px;"></div>
                        <div class="tile-name">${tile}</div>
                        <div style="display:flex;gap:4px;">
                            ${playersOnTile.map(p => `<div class="token" style="background:${p.color}"></div>`).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function showTileInfo(tileId) {
            const tile = tiles[tileId];
            const price = tilePrices[tileId];
            const owner = properties[tileId].owner;
            const ownerName = owner !== null ? players.find(p => p.id === owner)?.name : "Nimeni";
            
            let msg = `${tile}\n`;
            if (price > 0) msg += `Preț: ${price} RON\n`;
            msg += `Proprietar: ${ownerName}`;
            
            alert(msg);
        }
        
        function rollDice() {
            if (hasRolled) {
                alert("Ai dat deja zarul în această tură!");
                return;
            }
            
            const dice1 = Math.floor(Math.random() * 6) + 1;
            const dice2 = Math.floor(Math.random() * 6) + 1;
            const total = dice1 + dice2;
            currentRoll = total;
            hasRolled = true;
            
            // Animate dice
            animateDice(dice1, dice2);
            
            // Move player
            const player = players[currentPlayer];
            const oldPos = player.position;
            let newPos = (oldPos + total) % 40;
            player.position = newPos;
            
            // Check for passing GO
            if (newPos < oldPos) {
                player.money += 200;
                addLog(`${player.name} a trecut pe la Pornire și a primit 200 RON`);
            }
            
            addLog(`${player.name} a dat ${dice1} și ${dice2} → ${total} pași → ${tiles[newPos]}`);
            
            // Handle tile
            handleTile(newPos, player);
            
            renderGame();
            
            // Check for double
            if (dice1 === dice2) {
                addLog(`${player.name} a dat dublă! Mai joacă o dată.`);
                hasRolled = false;
                renderGame();
            }
        }
        
        function handleTile(tileId, player) {
            const tile = tiles[tileId];
            const price = tilePrices[tileId];
            const prop = properties[tileId];
            
            // Special tiles
            if (tile === "Du-te la Închisoare") {
                player.position = 10; // Jail position
                addLog(`${player.name} a fost trimis la închisoare!`);
                endTurn();
                return;
            }
            
            if (tile === "Șansă" || tile === "Cufărul Comunității") {
                const cards = [
                    "Avansați la Pornire +200 RON",
                    "Plătiți taxă 100 RON",
                    "Primiți 200 RON",
                    "Mergeti la închisoare",
                    "Plătiți 50 RON",
                    "Primiți 100 RON"
                ];
                const card = cards[Math.floor(Math.random() * cards.length)];
                addLog(`${player.name} a primit: ${card}`);
                
                if (card.includes("+200")) { player.money += 200; }
                else if (card.includes("Primiți 200")) { player.money += 200; }
                else if (card.includes("Primiți 100")) { player.money += 100; }
                else if (card.includes("Plătiți 100")) { player.money -= 100; }
                else if (card.includes("Plătiți 50")) { player.money -= 50; }
                else if (card.includes("închisoare")) {
                    player.position = 10;
                    addLog(`${player.name} a fost trimis la închisoare!`);
                }
                return;
            }
            
            if (tile === "Impozit pe Venit") {
                player.money -= 200;
                addLog(`${player.name} a plătit impozit 200 RON`);
                return;
            }
            
            if (tile === "Taxă de Lux") {
                player.money -= 100;
                addLog(`${player.name} a plătit taxă de lux 100 RON`);
                return;
            }
            
            // Property
            if (price > 0 && prop.owner === null) {
                const buy = confirm(`Cumpărați ${tile} pentru ${price} RON?`);
                if (buy && player.money >= price) {
                    player.money -= price;
                    prop.owner = player.id;
                    player.properties.push(tileId);
                    addLog(`${player.name} a cumpărat ${tile} pentru ${price} RON`);
                } else {
                    addLog(`${player.name} a refuzat să cumpere ${tile}`);
                }
            } 
            else if (price > 0 && prop.owner !== null && prop.owner !== player.id) {
                const owner = players.find(p => p.id === prop.owner);
                const rent = Math.floor(price / 10);
                if (player.money >= rent) {
                    player.money -= rent;
                    owner.money += rent;
                    addLog(`${player.name} a plătit ${rent} RON chirie lui ${owner.name} pentru ${tile}`);
                } else {
                    addLog(`${player.name} a dat faliment! Nu are suficienți bani pentru chirie.`);
                }
            }
            
            // Check for bankruptcy
            if (player.money < 0) {
                addLog(`${player.name} a dat faliment și a pierdut jocul!`);
                players.splice(currentPlayer, 1);
                if (players.length === 1) {
                    addLog(`🏆 ${players[0].name} a câștigat jocul! 🏆`);
                    resetGame();
                } else if (currentPlayer >= players.length) {
                    currentPlayer = 0;
                }
                hasRolled = false;
                renderGame();
            }
        }
        
        function endTurn() {
            if (!hasRolled) {
                alert("Trebuie să dai cu zarul mai întâi!");
                return;
            }
            
            currentPlayer = (currentPlayer + 1) % players.length;
            hasRolled = false;
            addLog(`--- Rândul lui ${players[currentPlayer].name} ---`);
            renderGame();
        }
        
        function resetGame() {
            if (confirm("Începeți un joc nou?")) {
                players = [];
                currentPlayer = 0;
                hasRolled = false;
                gameLog = [];
                properties = {};
                init();
            }
        }
        
        function animateDice(d1, d2) {
            const die1 = document.getElementById('die1');
            const die2 = document.getElementById('die2');
            const faces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            
            let count = 0;
            const interval = setInterval(() => {
                die1.innerText = faces[Math.floor(Math.random() * 6)];
                die2.innerText = faces[Math.floor(Math.random() * 6)];
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    die1.innerText = faces[d1 - 1];
                    die2.innerText = faces[d2 - 1];
                }
            }, 50);
        }
        
        // Start the game
        init();
    </script>
</body>
</html>
