<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monopoly Romania - Premium</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Poppins', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a2f1f, #030a05);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
        }

        /* ========== GLASS CARD ========== */
        .glass-card {
            background: rgba(15, 25, 20, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 0, 0.1) inset;
        }

        /* ========== HOME SCREEN ========== */
        .home-screen {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
        }

        .monopoly-logo {
            font-size: 72px;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
            margin-bottom: 16px;
        }

        h1 {
            font-size: 44px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .gold-text {
            color: #FFD700;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 60px;
            color: white;
            transition: all 0.3s;
            margin: 12px 0;
        }

        .input-field:focus {
            outline: none;
            border-color: #FFD700;
            background: rgba(0, 0, 0, 0.8);
        }

        .btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            color: #1a1a2e;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 12px;
        }

        .btn:active { transform: scale(0.97); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 215, 0, 0.4);
        }

        /* ========== WAITING SCREEN ========== */
        .waiting-screen {
            padding: 32px 24px;
            text-align: center;
        }

        .room-code-box {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 12px 24px;
            border-radius: 60px;
            display: inline-block;
            margin: 20px 0;
        }

        .room-code {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #1a1a2e;
        }

        .player-card-waiting {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 12px 20px;
            margin: 10px 0;
        }

        /* ========== GAME SCREEN ========== */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .turn-indicator {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .players-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .player-badge {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 16px;
            text-align: center;
            border-left: 4px solid;
            transition: all 0.2s;
        }

        .player-badge.active {
            background: rgba(255,215,0,0.15);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        .player-avatar {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .player-name-game {
            font-weight: bold;
            font-size: 14px;
        }

        .player-money-game {
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
        }

        /* Board */
        .board-container {
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            padding: 12px;
            max-height: 42vh;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .tile-item {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 10px 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s;
        }

        .tile-number-circle {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #1a1a2e;
        }

        .tile-color-strip {
            width: 6px;
            height: 44px;
            border-radius: 3px;
        }

        .tile-details {
            flex: 1;
        }

        .tile-name-game {
            font-size: 13px;
            font-weight: 500;
        }

        .tile-owner-name {
            font-size: 10px;
            opacity: 0.6;
        }

        .tile-players-dots {
            display: flex;
            gap: 6px;
        }

        .player-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid white;
        }

        /* Dice Area */
        .dice-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }

        .dice-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .die {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .die.rolling {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .action-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* Log */
        .log-area {
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 12px;
            max-height: 130px;
            overflow-y: auto;
        }

        .log-line {
            font-size: 11px;
            font-family: monospace;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 40px;
            padding: 32px;
            max-width: 90%;
            width: 340px;
            text-align: center;
            border: 2px solid #FFD700;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            z-index: 100;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .toast-error { background: #e74c3c; }
        .toast-success { background: #27ae60; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- HOME SCREEN -->
        <div id="homeScreen" class="home-screen glass-card">
            <div class="monopoly-logo">🎲</div>
            <h1>MONOPOLY</h1>
            <div style="font-size: 14px; color: #FFD700; letter-spacing: 2px;">ROMÂNIA</div>

            <input type="text" id="playerName" class="input-field" placeholder="Numele tău" maxlength="15">
            <button class="btn" onclick="createGame()">✨ Creează Joc Nou</button>
            
            <div style="margin: 16px 0; color: rgba(255,255,255,0.3);">sau</div>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="joinCode" class="input-field" placeholder="Cod (6 cifre)" maxlength="6" style="flex: 1;">
                <button class="btn btn-secondary" onclick="joinGame()" style="width: auto; padding: 16px 24px;">🔗 Intră</button>
            </div>
        </div>

        <div id="waitingScreen" class="waiting-screen glass-card" style="display: none;">

            <div class="room-code-box"><span class="room-code" id="roomCodeDisplay">------</span></div>
            <div id="waitingPlayersList"></div>
            <div id="startBtnContainer" style="display: none;">
                <button class="btn" onclick="startGame()">🎮 Începe Jocul</button>
            </div>
            <div id="waitingSpinner"><div style="width: 30px; height: 30px; border: 3px solid rgba(255,215,0,0.3); border-top-color: #FFD700; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto;"></div><p style="font-size: 13px;">Așteptând al doilea jucător...</p></div>
        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" style="display: none;">
            <div class="game-header">
                <div class="turn-indicator" id="turnText">Încărcare...</div>
            </div>
            <div class="players-row" id="playersRow"></div>
            <div class="board-container" id="boardContainer"></div>
            <div class="dice-panel">
                <div class="dice-row">
                    <div class="die" id="die1">⚀</div>
                    <div class="die" id="die2">⚀</div>
                </div>
                <div class="action-row">
                    <button class="btn" id="rollBtn" onclick="rollDice()" style="width: auto; padding: 12px 28px;">🎲 Aruncă Zarul</button>
                    <button class="btn btn-secondary" id="endTurnBtn" onclick="endTurn()" style="width: auto; padding: 12px 28px;" disabled>⏭️ Termină</button>
                </div>
            </div>
            <div class="log-area" id="logArea"></div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle" style="color:#FFD700;">Confirmă</h3>
            <p id="modalMsg" style="margin: 16px 0;"></p>
            <div id="modalButtons" class="modal-btns"></div>
        </div>
    </div>

            {id:34, name:"Calea Victoriei", color:"#1FB25A", price:320, type:"property", group:"green", rent:[28,56,150,450,1000,1200,1400], houseCost:200},
            {id:35, name:"Gara de Nord", color:"#333", price:200, type:"railroad", rent:[25,50,100,200], houseCost:0},
            {id:36, name:"Șansă", color:"#87CEEB", price:0, type:"chance", rent:[0], houseCost:0},
            {id:37, name:"B-dul Magheru", color:"#0D4C92", price:350, type:"property", group:"darkblue", rent:[35,70,175,500,1100,1300,1500], houseCost:200},
            {id:38, name:"Taxă de Lux", color:"#FF4444", price:100, type:"tax", rent:[100], houseCost:0},
            {id:39, name:"B-dul Primăverii", color:"#0D4C92", price:400, type:"property", group:"darkblue", rent:[50,100,200,600,1400,1700,2000], houseCost:200}
        ];

        const COLORS = ["#FF4444", "#4444FF"];
        const EMOJIS = ["🐶", "🐱"];

        let roomId = null, myId = null, myName = null, isAdmin = false, gameData = null;

        // Helper functions
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showModal(title, msg, btns) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMsg').innerText = msg;
            const container = document.getElementById('modalButtons');
            container.innerHTML = '';
            btns.forEach(btn => {
                const b = document.createElement('button');
                b.innerText = btn.text;
                b.style.padding = '10px 20px';
                b.style.borderRadius = '40px';
                b.style.border = 'none';
                b.style.fontWeight = 'bold';
                b.style.cursor = 'pointer';
                b.style.background = btn.text.includes('✅') ? '#27ae60' : '#e74c3c';
                b.style.color = 'white';
                b.onclick = () => { btn.action(); closeModal(); };
                container.appendChild(b);
            });
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function generateCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }

        function createGame() {
            myName = document.getElementById('playerName').value.trim();
            if (!myName) { showToast("Introdu un nume!", "error"); return; }
            roomId = generateCode();
            myId = myName + "_" + Date.now();
            isAdmin = true;
            
            const initState = {
                players: {},
                turnOrder: [],
                currentTurn: null,
                hasRolled: false,
                dice: [1,1],
                log: ["🎲 Joc creat! Așteptând al doilea jucător..."],
                properties: {},
                gameStarted: false
            };
            TILES.forEach(t => { initState.properties[t.id] = { owner: null, houses: 0 }; });
            initState.players[myId] = {
                id: myId, name: myName, color: COLORS[0], emoji: EMOJIS[0],
                money: 1500, position: 0, properties: [], isActive: true
            };
            initState.turnOrder = [myId];
            
            db.ref('games/' + roomId).set(initState);
            joinRoom(roomId);
        }

        function joinGame() {
            myName = document.getElementById('playerName').value.trim();
            if (!myName) { showToast("Introdu un nume!", "error"); return; }
            const code = document.getElementById('joinCode').value.trim();
            if (!code || code.length !== 6) { showToast("Cod invalid!", "error"); return; }
            roomId = code;
            myId = myName + "_" + Date.now();
            isAdmin = false;
            joinRoom(roomId);
        }

        function joinRoom(roomId) {
            const ref = db.ref('games/' + roomId);
            ref.once('value', (snap) => {
                const game = snap.val();
                if (!game) { showToast("Jocul nu există!", "error"); return; }
                if (Object.keys(game.players).length >= 2) { showToast("Jocul este plin!", "error"); return; }
                
                const newPlayer = {
                    id: myId, name: myName, color: COLORS[1], emoji: EMOJIS[1],
                    money: 1500, position: 0, properties: [], isActive: true
                };
                const updates = {};
                updates[`players/${myId}`] = newPlayer;
                updates.turnOrder = [game.turnOrder[0], myId];
                ref.update(updates);
                
                document.getElementById('homeScreen').style.display = 'none';
                document.getElementById('waitingScreen').style.display = 'block';
                document.getElementById('roomCodeDisplay').innerText = roomId;
                if (isAdmin) document.getElementById('startBtnContainer').style.display = 'block';
                if (!isAdmin) document.getElementById('waitingSpinner').innerHTML = '<div style="width:30px;height:30px;border:3px solid rgba(255,215,0,0.3);border-top-color:#FFD700;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto;"></div><p>Așteptând gazda să înceapă...</p>';
                
                db.ref('games/' + roomId + '/players').on('value', (s) => {
                    const players = s.val() || {};
                    const container = document.getElementById('waitingPlayersList');
                    container.innerHTML = Object.values(players).map(p => `
                        <div class="player-card-waiting">
                            <div style="font-size:32px;">${p.emoji}</div>
                            <div style="flex:1; text-align:left;"><strong>${p.name}</strong><div style="font-size:11px;">${p.id === game?.adminId ? '👑 Gazdă' : '✅ Conectat'}</div></div>
                            <div style="color:${p.color}; font-size:24px;">●</div>
                        </div>
                    `).join('');
                    if (Object.keys(players).length === 2 && isAdmin) {
                        document.getElementById('waitingSpinner').innerHTML = '<p style="color:#27ae60;">✅ Ambii jucători conectați! Apasă "Începe Jocul"</p>';
                    }
                });
                setupGameListener(roomId);
            });
        }

        function setupGameListener(roomId) {
            db.ref('games/' + roomId).on('value', (snap) => {
                const data = snap.val();
                if (data && data.gameStarted) {
                    document.getElementById('waitingScreen').style.display = 'none';
                    document.getElementById('gameScreen').style.display = 'block';
                    gameData = data;
                    renderGame();
                } else if (data) {
                    gameData = data;
                }
            });
        }

        function startGame() {
            if (!isAdmin) return;
            if (Object.keys(gameData.players).length !== 2) { showToast("Trebuie 2 jucători!", "error"); return; }
            db.ref('games/' + roomId).update({
                gameStarted: true,
                currentTurn: gameData.turnOrder[0],
                hasRolled: false,
                log: ["🎲 Jocul a început! Mult noroc!"]
            });
        }

        function rollDice() {
            if (!gameData || gameData.currentTurn !== myId) { showToast("Nu e rândul tău!", "error"); return; }
            if (gameData.hasRolled) { showToast("Ai aruncat deja!", "error"); return; }
            
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1, total = d1+d2;
            animateDice(d1, d2);
            
            const player = gameData.players[myId];
            const oldPos = player.position;
            let newPos = (oldPos + total) % 40;
            const updates = { dice: [d1,d2], hasRolled: true };
            updates[`players/${myId}/position`] = newPos;
            
            if (newPos < oldPos) {
                updates[`players/${myId}/money`] = player.money + 200;
                addLog(`${player.name} a trecut pe la Pornire +200 RON`);
            }
            
            const tile = TILES[newPos];
            addLog(`${player.name} a dat ${d1}+${d2}=${total} → ${tile.name}`);
            
            // Handle property purchase
            if (tile.type === "property" && tile.price > 0) {
                const prop = gameData.properties[newPos];
                if (!prop.owner) {
                    showModal("Cumpără proprietate", `${tile.name} - ${tile.price} RON`, [
                        { text: "✅ Cumpără", action: () => buyProperty(newPos, tile.price) },
                        { text: "❌ Refuză", action: () => declineProperty(newPos) }
                    ]);
                    return;
                } else if (prop.owner !== myId) {
                    const owner = gameData.players[prop.owner];
                    const rent = Math.floor(tile.price / 10);
                    if (player.money >= rent) {
                        updates[`players/${myId}/money`] = player.money - rent;
                        updates[`players/${prop.owner}/money`] = owner.money + rent;
                        addLog(`${player.name} a plătit ${rent} RON chirie lui ${owner.name}`);
                    }
                }
            }
            
            if (tile.type === "tax") {
                updates[`players/${myId}/money`] = player.money - tile.price;
                addLog(`${player.name} a plătit taxă ${tile.price} RON`);
            }
            
            if (tile.type === "go_to_jail") {
                updates[`players/${myId}/position`] = 10;
                addLog(`${player.name} a mers la închisoare!`);
            }
            
            if (d1 !== d2) {
                const idx = gameData.turnOrder.indexOf(myId);
                const next = (idx + 1) % 2;
                updates.currentTurn = gameData.turnOrder[next];
                updates.hasRolled = false;
                addLog(`Rândul lui ${gameData.players[gameData.turnOrder[next]].name}`);
            } else {
                addLog(`${player.name} a dat dublă! Mai joacă o dată.`);
                updates.hasRolled = false;
            }
            
            db.ref('games/' + roomId).update(updates);
        }
        
        function buyProperty(tileId, price) {
            const player = gameData.players[myId];
            if (player.money >= price) {
                const updates = {};
                updates[`players/${myId}/money`] = player.money - price;
                updates[`players/${myId}/properties/${tileId}`] = true;
                updates[`properties/${tileId}/owner`] = myId;
                addLog(`${player.name} a cumpărat ${TILES[tileId].name} pentru ${price} RON`);
                const idx = gameData.turnOrder.indexOf(myId);
                const next = (idx + 1) % 2;
                updates.currentTurn = gameData.turnOrder[next];
                updates.hasRolled = false;
                addLog(`Rândul lui ${gameData.players[gameData.turnOrder[next]].name}`);
                db.ref('games/' + roomId).update(updates);
            }
        }
        
        function declineProperty(tileId) {
            const player = gameData.players[myId];
            addLog(`${player.name} a refuzat să cumpere ${TILES[tileId].name}`);
            const idx = gameData.turnOrder.indexOf(myId);
            const next = (idx + 1) % 2;
            const updates = { currentTurn: gameData.turnOrder[next], hasRolled: false };
            addLog(`Rândul lui ${gameData.players[gameData.turnOrder[next]].name}`);
            db.ref('games/' + roomId).update(updates);
        }
        
        function endTurn() {
            if (!gameData || gameData.currentTurn !== myId) { showToast("Nu e rândul tău!", "error"); return; }
            if (!gameData.hasRolled) { showToast("Trebuie să arunci zarul!", "error"); return; }
            const idx = gameData.turnOrder.indexOf(myId);
            const next = (idx + 1) % 2;
            const updates = { currentTurn: gameData.turnOrder[next], hasRolled: false };
            addLog(`${gameData.players[myId].name} și-a terminat tura. Rândul lui ${gameData.players[gameData.turnOrder[next]].name}`);
            db.ref('games/' + roomId).update(updates);
        }
        
        function addLog(msg) {
            db.ref('games/' + roomId).once('value', (snap) => {
                const log = snap.val()?.log || [];
                const newLog = [msg, ...log].slice(0, 30);
                db.ref('games/' + roomId).update({ log: newLog });
            });
        }
        
        function animateDice(d1, d2) {
            const die1 = document.getElementById('die1'), die2 = document.getElementById('die2');
            const faces = ["⚀","⚁","⚂","⚃","⚄","⚅"];
            die1.classList.add('rolling'); die2.classList.add('rolling');
            let count = 0;
            const intv = setInterval(() => {
                die1.innerText = faces[Math.floor(Math.random()*6)];
                die2.innerText = faces[Math.floor(Math.random()*6)];
                count++;
                if (count > 10) {
                    clearInterval(intv);
                    die1.classList.remove('rolling'); die2.classList.remove('rolling');
                    die1.innerText = faces[d1-1]; die2.innerText = faces[d2-1];
                }
            }, 50);
        }
        
        function renderGame() {
            if (!gameData) return;
            const players = gameData.players;
            const playersArr = Object.values(players);
            document.getElementById('playersRow').innerHTML = playersArr.map(p => `
                <div class="player-badge ${gameData.currentTurn === p.id ? 'active' : ''}" style="border-left-color: ${p.color}">
                    <div class="player-avatar">${p.emoji}</div>
                    <div class="player-name-game">${p.name}</div>
                    <div class="player-money-game">💰 ${p.money}</div>
                </div>
            `).join('');
            
            const isMyTurn = gameData.currentTurn === myId;
            document.getElementById('turnText').innerHTML = isMyTurn ? '🎲 TURA TA' : `⏳ Rândul lui ${players[gameData.currentTurn]?.name}`;
            document.getElementById('rollBtn').disabled = !(isMyTurn && !gameData.hasRolled);
            document.getElementById('endTurnBtn').disabled = !(isMyTurn && gameData.hasRolled);
            
            const boardDiv = document.getElementById('boardContainer');
            boardDiv.innerHTML = TILES.map((tile, i) => {
                const playersHere = playersArr.filter(p => p.position === i);
                const ownerId = gameData.properties[i]?.owner;
                const ownerName = ownerId ? players[ownerId]?.name : null;
                return `
                    <div class="tile-item" onclick="showTileInfo(${i})">
                        <div class="tile-number-circle">${i+1}</div>
                        <div class="tile-color-strip" style="background:${tile.color}"></div>
                        <div class="tile-details">
                            <div class="tile-name-game">${tile.name}</div>
                            <div class="tile-owner-name">${ownerName ? `👑 ${ownerName}` : tile.price > 0 ? `💰 ${tile.price} RON` : '📌'}</div>
                        </div>
                        <div class="tile-players-dots">${playersHere.map(p => `<div class="player-dot" style="background:${p.color}" title="${p.name}"></div>`).join('')}</div>
                    </div>
                `;
            }).join('');
            
            const logDiv = document.getElementById('logArea');
            if (gameData.log) logDiv.innerHTML = gameData.log.map(l => `<div class="log-line">${l}</div>`).join('');
        }
        
        function showTileInfo(id) {
            const t = TILES[id];
            const owner = gameData?.properties[id]?.owner;
            const ownerName = owner ? gameData?.players[owner]?.name : "Nimeni";
            showModal(t.name, `Preț: ${t.price} RON\nProprietar: ${ownerName}\nTip: ${t.type}`, [{ text: "Închide", action: closeModal }]);
        }
        
        document.getElementById('rollBtn').disabled = true;
        document.getElementById('endTurnBtn').disabled = true;
    </script>
</body>
</html>
