<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monopoly Romania - Multiplayer</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a2f1f 0%, #05140a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
        }

        h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h2 {
            font-size: 20px;
            color: #FFD700;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: #FFD700;
        }

        .btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            color: #1a1a2e;
            margin-top: 12px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; }

        .card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 28px 20px;
            margin: 16px 0;
            border: 1px solid rgba(255, 215, 0, 0.2);
            text-align: center;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .room-code {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 3px;
            color: #1a1a2e;
        }

        .turn-badge {
            background: rgba(255, 215, 0, 0.2);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 14px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border-left: 4px solid;
        }

        .player-card.active {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.02);
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: rgba(0,0,0,0.3);
        }

        .player-name { font-weight: bold; font-size: 14px; }
        .player-money { font-size: 16px; font-weight: bold; color: #FFD700; }

        .board {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 12px;
            max-height: 45vh;
            overflow-y: auto;
            margin: 16px 0;
        }

        .tile {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 10px 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .tile-number {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #1a1a2e;
        }

        .tile-color { width: 6px; height: 40px; border-radius: 3px; }
        .tile-info { flex: 1; }
        .tile-name { font-size: 13px; font-weight: 500; }
        .tile-owner { font-size: 10px; opacity: 0.6; }
        .tile-players { display: flex; gap: 4px; }
        .tile-player-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; }

        .dice-area {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            margin: 16px 0;
        }

        .dice-container {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .die {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            color: #333;
        }

        .die.rolling { animation: diceRoll 0.1s infinite; }
        @keyframes diceRoll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .game-log {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 12px;
            max-height: 140px;
            overflow-y: auto;
            margin-top: 16px;
        }

        .log-entry {
            font-size: 11px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-family: monospace;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 32px;
            padding: 32px;
            max-width: 90%;
            width: 320px;
            text-align: center;
            border: 2px solid #FFD700;
        }

        .modal-content h3 { color: #FFD700; margin-bottom: 16px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }

        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            z-index: 100;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .status.error { background: #e74c3c; }
        .status.success { background: #27ae60; }

        .waiting-player {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="lobbyScreen" class="card" style="margin-top: 40px;">
            <h1>🎲 MONOPOLY</h1>
            <p style="margin: 16px 0; color: #FFD700;">ROMÂNIA</p>
            <p style="margin-bottom: 24px; font-size: 14px;">Multiplayer - Fiecare pe telefonul său</p>
            
            <input type="text" id="playerNameInput" placeholder="Numele tău" maxlength="15">
            
            <button class="btn" onclick="createGame()">✨ Creează Joc Nou</button>
            <div style="margin: 16px 0; text-align: center; color: rgba(255,255,255,0.5);">sau</div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="joinCodeInput" placeholder="Cod camera (6 cifre)" maxlength="6" style="flex: 1;">
                <button class="btn btn-secondary" onclick="joinGame()" style="width: auto; padding: 16px 24px;">🔗 Intră</button>
            </div>
        </div>

        <div id="waitingScreen" style="display: none;">
            <div class="card">
                <h2>🕐 Așteptând jucători</h2>
                <div class="room-code" id="roomCodeDisplay">------</div>
                <div id="waitingPlayersList"></div>
                <div id="startGameBtn" style="display: none;">
                    <button class="btn" onclick="startGame()">🎮 Începe Jocul</button>
                </div>
                <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">Așteaptă ca toți jucătorii să se conecteze...</p>
            </div>
        </div>

        <div id="gameScreen" style="display: none;">
            <div class="game-header">
                <div class="room-code" id="gameRoomCode">------</div>
                <div class="turn-badge" id="turnBadge">Încărcare...</div>
            </div>
            <div id="playersStats" class="players-grid"></div>
            <div class="board" id="board"></div>
            <div class="dice-area">
                <div class="dice-container">
                    <div class="die" id="die1">⚀</div>
                    <div class="die" id="die2">⚀</div>
                </div>
                <div class="action-buttons">
                    <button class="btn" id="rollBtn" onclick="rollDice()" style="width: auto; padding: 14px 28px;">🎲 Aruncă Zarul</button>
                    <button class="btn btn-secondary" id="endTurnBtn" onclick="endTurn()" style="width: auto; padding: 14px 28px;" disabled>⏭️ Termină</button>
                </div>
            </div>
            <div class="game-log" id="gameLog"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMsg"></p>
            <div id="modalBtns" class="modal-buttons"></div>
        </div>
    </div>

    <script>
        // ====================================================================
        // YOUR FIREBASE CONFIGURATION
        // ====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBD9yxz2SP35xzNvN9Q5MYM3lcQgd8snAA",
            authDomain: "monopolymd.firebaseapp.com",
            databaseURL: "https://monopolymd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "monopolymd",
            storageBucket: "monopolymd.firebasestorage.app",
            messagingSenderId: "175522958186",
            appId: "1:175522958186:web:fb224b774ec3ea287bf313"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // ====================================================================
        // GAME CONSTANTS
        // ====================================================================
        const TILES = [
            {id:0, name:"Pornire", color:"#FFD700", price:0, type:"go"},
            {id:1, name:"Rahova", color:"#955436", price:60, type:"property"},

            {id:16, name:"B-dul Timișoara", color:"#FAA61A", price:180, type:"property"},
            {id:17, name:"Cufărul Comunității", color:"#90EE90", price:0, type:"chest"},
            {id:18, name:"B-dul Brașov", color:"#FAA61A", price:180, type:"property"},
            {id:19, name:"Drumul Taberei", color:"#FAA61A", price:200, type:"property"},
            {id:20, name:"Parcare Gratuită", color:"#FFF", price:0, type:"free"},
            {id:21, name:"B-dul Carol I", color:"#ED1B24", price:220, type:"property"},
            {id:22, name:"Șansă", color:"#87CEEB", price:0, type:"chance"},
            {id:23, name:"B-dul Kogălniceanu", color:"#ED1B24", price:220, type:"property"},
            {id:24, name:"B-dul Eroilor", color:"#ED1B24", price:240, type:"property"},
            {id:25, name:"Gara Basarab", color:"#333", price:200, type:"railroad"},
            {id:26, name:"B-dul Titulescu", color:"#FFF200", price:260, type:"property"},
            {id:27, name:"B-dul 1 Mai", color:"#FFF200", price:260, type:"property"},
            {id:28, name:"Uzina de Apă", color:"#CCC", price:150, type:"utility"},
            {id:29, name:"Calea Dorobanților", color:"#FFF200", price:280, type:"property"},
            {id:30, name:"Du-te la Închisoare", color:"#808080", price:0, type:"go_to_jail"},
            {id:31, name:"Piața Unirii", color:"#1FB25A", price:300, type:"property"},
            {id:32, name:"Cotroceni", color:"#1FB25A", price:300, type:"property"},
            {id:33, name:"Cufărul Comunității", color:"#90EE90", price:0, type:"chest"},
            {id:34, name:"Calea Victoriei", color:"#1FB25A", price:320, type:"property"},
            {id:35, name:"Gara de Nord", color:"#333", price:200, type:"railroad"},
            {id:36, name:"Șansă", color:"#87CEEB", price:0, type:"chance"},
            {id:37, name:"B-dul Magheru", color:"#0D4C92", price:350, type:"property"},
            {id:38, name:"Taxă de Lux", color:"#FF4444", price:100, type:"tax"},
            {id:39, name:"B-dul Primăverii", color:"#0D4C92", price:400, type:"property"}
        ];
        
        const PLAYER_COLORS = ["#FF4444", "#4444FF", "#44FF44", "#FFFF44", "#FF44FF", "#FF8844", "#FF88FF", "#44FFFF"];
        const PLAYER_EMOJIS = ["🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼"];
        
        let currentRoomId = null;
        let myPlayerId = null;
        let myPlayerName = null;
        let isAdmin = false;
        let gameData = null;
        
        function showStatus(msg, type) {
            const status = document.createElement('div');
            status.className = `status ${type}`;
            status.innerText = msg;
            document.body.appendChild(status);
            setTimeout(() => status.remove(), 3000);
        }
        
        function showModal(title, msg, buttons) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMsg').innerText = msg;
            const btnsDiv = document.getElementById('modalBtns');
            btnsDiv.innerHTML = '';
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.innerText = btn.text;
                button.className = 'btn btn-secondary';
                button.style.margin = '0';
                button.onclick = () => { btn.action(); closeModal(); };
                btnsDiv.appendChild(button);
            });
            document.getElementById('modal').style.display = 'flex';
        }
        
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function generateRoomCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }
        
        function createGame() {
            myPlayerName = document.getElementById('playerNameInput').value.trim();
            if (!myPlayerName) { showStatus("Introdu un nume!", "error"); return; }
            
            const roomCode = generateRoomCode();
            currentRoomId = roomCode;
            myPlayerId = myPlayerName + "_" + Date.now();
            isAdmin = true;
            
            const initialGameState = {
                players: {},
                currentTurn: null,
                hasRolled: false,
                dice: [1, 1],
                log: ["🎲 Joc creat! Așteptând jucători..."],
                properties: {},
                gameStarted: false,
                adminId: myPlayerId,
                turnOrder: []
            };
            
            TILES.forEach(tile => { initialGameState.properties[tile.id] = { owner: null, houses: 0 }; });
            initialGameState.players[myPlayerId] = {
                id: myPlayerId, name: myPlayerName, color: PLAYER_COLORS[0], emoji: PLAYER_EMOJIS[0],
                money: 1500, position: 0, properties: [], isActive: true
            };
            initialGameState.turnOrder = [myPlayerId];
            
            database.ref('games/' + roomCode).set(initialGameState);
            joinGameRoom(roomCode);
        }
        
        function joinGame() {
            myPlayerName = document.getElementById('playerNameInput').value.trim();
            if (!myPlayerName) { showStatus("Introdu un nume!", "error"); return; }
            
            const roomCode = document.getElementById('joinCodeInput').value.trim();
            if (!roomCode || roomCode.length !== 6) { showStatus("Cod invalid! 6 cifre.", "error"); return; }
            
            currentRoomId = roomCode;
            myPlayerId = myPlayerName + "_" + Date.now();
            isAdmin = false;
            joinGameRoom(roomCode);
        }
        
        function joinGameRoom(roomCode) {
            const gameRef = database.ref('games/' + roomCode);
            gameRef.once('value', (snapshot) => {
                const game = snapshot.val();
                if (!game) { showStatus("Jocul nu există!", "error"); return; }
                
                const playerCount = Object.keys(game.players || {}).length;
                if (playerCount >= 8) { showStatus("Jocul este plin!", "error"); return; }
                
                const newPlayer = {
                    id: myPlayerId, name: myPlayerName, color: PLAYER_COLORS[playerCount % PLAYER_COLORS.length],
                    emoji: PLAYER_EMOJIS[playerCount % PLAYER_EMOJIS.length], money: 1500, position: 0, properties: [], isActive: true
                };
                
                const updates = {};
                updates[`players/${myPlayerId}`] = newPlayer;
                updates[`turnOrder/${playerCount}`] = myPlayerId;
                gameRef.update(updates);
                
                setupGameListeners(roomCode);
                
                document.getElementById('lobbyScreen').style.display = 'none';
                document.getElementById('waitingScreen').style.display = 'block';
                document.getElementById('roomCodeDisplay').innerText = roomCode;
                if (isAdmin) document.getElementById('startGameBtn').style.display = 'block';
                
                database.ref('games/' + roomCode + '/players').on('value', (snap) => {
                    const players = snap.val() || {};
                    const container = document.getElementById('waitingPlayersList');
                    container.innerHTML = Object.values(players).map(p => `
                        <div class="waiting-player">
                            <div style="font-size: 32px;">${p.emoji}</div>
                            <div style="flex:1; font-weight: bold;">${p.name}</div>
                            <div style="color: ${p.color}; font-size: 20px;">●</div>
                        </div>
                    `).join('');
                });
            });
        }
        
        function setupGameListeners(roomCode) {
            database.ref('games/' + roomCode).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.gameStarted) {
                    document.getElementById('waitingScreen').style.display = 'none';
                    document.getElementById('gameScreen').style.display = 'block';
                    document.getElementById('gameRoomCode').innerText = roomCode;
                    gameData = data;
                    renderGame();
                }
            });
        }
        
        function startGame() {
            if (!isAdmin) return;
            const gameRef = database.ref('games/' + currentRoomId);
            gameRef.update({
                gameStarted: true,
                currentTurn: gameData.turnOrder[0],
                hasRolled: false,
                log: ["🎲 Jocul a început! Mult noroc!"]
            });
        }
        
        function rollDice() {
            if (!gameData || gameData.currentTurn !== myPlayerId) { showStatus("Nu este rândul tău!", "error"); return; }
            if (gameData.hasRolled) { showStatus("Ai aruncat deja zarul!", "error"); return; }
            
            const dice1 = Math.floor(Math.random() * 6) + 1;
            const dice2 = Math.floor(Math.random() * 6) + 1;
            const total = dice1 + dice2;
            
            animateDice(dice1, dice2);
            
            const player = gameData.players[myPlayerId];
            const oldPos = player.position;
            let newPos = (oldPos + total) % 40;
            
            const updates = { dice: [dice1, dice2], hasRolled: true };
            updates[`players/${myPlayerId}/position`] = newPos;
            
            if (newPos < oldPos) {
                updates[`players/${myPlayerId}/money`] = player.money + 200;
                addLogEntry(`${player.name} a trecut pe la Pornire +200 RON`);
            }
            
            const tile = TILES[newPos];
            addLogEntry(`${player.name} a dat ${dice1}+${dice2}=${total} → ${tile.name}`);
            
            if (tile.type === "property" && tile.price > 0) {
                const property = gameData.properties[newPos];
                if (!property.owner) {
                    showModal("Cumpără proprietate", `${tile.name} - ${tile.price} RON`, [
                        { text: "✅ Cumpără", action: () => buyProperty(newPos, tile.price) },
                        { text: "❌ Refuză", action: () => declineProperty(newPos) }
                    ]);
                    return;
                } else if (property.owner !== myPlayerId) {
                    const owner = gameData.players[property.owner];
                    const rent = Math.floor(tile.price / 10);
                    if (player.money >= rent) {
                        updates[`players/${myPlayerId}/money`] = player.money - rent;
                        updates[`players/${property.owner}/money`] = owner.money + rent;
                        addLogEntry(`${player.name} a plătit ${rent} RON chirie lui ${owner.name}`);
                    }
                }
            }
            
            if (dice1 !== dice2) {
                const currentIndex = gameData.turnOrder.indexOf(myPlayerId);
                const nextIndex = (currentIndex + 1) % gameData.turnOrder.length;
                updates.currentTurn = gameData.turnOrder[nextIndex];
                updates.hasRolled = false;
                addLogEntry(`Rândul lui ${gameData.players[gameData.turnOrder[nextIndex]].name}`);
            } else {
                addLogEntry(`${player.name} a dat dublă! Mai joacă o dată.`);
                updates.hasRolled = false;
            }
            
            database.ref('games/' + currentRoomId).update(updates);
        }
        
        function buyProperty(tileId, price) {
            const player = gameData.players[myPlayerId];
            if (player.money >= price) {
                const updates = {};
                updates[`players/${myPlayerId}/money`] = player.money - price;
                updates[`players/${myPlayerId}/properties/${tileId}`] = true;
                updates[`properties/${tileId}/owner`] = myPlayerId;
                addLogEntry(`${player.name} a cumpărat ${TILES[tileId].name} pentru ${price} RON`);
                
                const currentIndex = gameData.turnOrder.indexOf(myPlayerId);
                const nextIndex = (currentIndex + 1) % gameData.turnOrder.length;
                updates.currentTurn = gameData.turnOrder[nextIndex];
                updates.hasRolled = false;
                addLogEntry(`Rândul lui ${gameData.players[gameData.turnOrder[nextIndex]].name}`);
                
                database.ref('games/' + currentRoomId).update(updates);
            }
        }
        
        function declineProperty(tileId) {
            const player = gameData.players[myPlayerId];
            addLogEntry(`${player.name} a refuzat să cumpere ${TILES[tileId].name}`);
            
            const updates = {};
            const currentIndex = gameData.turnOrder.indexOf(myPlayerId);
            const nextIndex = (currentIndex + 1) % gameData.turnOrder.length;
            updates.currentTurn = gameData.turnOrder[nextIndex];
            updates.hasRolled = false;
            addLogEntry(`Rândul lui ${gameData.players[gameData.turnOrder[nextIndex]].name}`);
            
            database.ref('games/' + currentRoomId).update(updates);
        }
        
        function endTurn() {
            if (!gameData || gameData.currentTurn !== myPlayerId) { showStatus("Nu este rândul tău!", "error"); return; }
            if (!gameData.hasRolled) { showStatus("Trebuie să arunci zarul mai întâi!", "error"); return; }
            
            const updates = {};
            const currentIndex = gameData.turnOrder.indexOf(myPlayerId);
            const nextIndex = (currentIndex + 1) % gameData.turnOrder.length;
            updates.currentTurn = gameData.turnOrder[nextIndex];
            updates.hasRolled = false;
            addLogEntry(`${gameData.players[myPlayerId].name} și-a terminat tura. Rândul lui ${gameData.players[gameData.turnOrder[nextIndex]].name}`);
            
            database.ref('games/' + currentRoomId).update(updates);
        }
        
        function addLogEntry(message) {
            const gameRef = database.ref('games/' + currentRoomId);
            gameRef.once('value', (snap) => {
                const currentLog = snap.val()?.log || [];
                const newLog = [message, ...currentLog].slice(0, 30);
                gameRef.update({ log: newLog });
            });
        }
        
        function animateDice(d1, d2) {
            const die1 = document.getElementById('die1');
            const die2 = document.getElementById('die2');
            const faces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            die1.classList.add('rolling');
            die2.classList.add('rolling');
            let count = 0;
            const interval = setInterval(() => {
                die1.innerText = faces[Math.floor(Math.random() * 6)];
                die2.innerText = faces[Math.floor(Math.random() * 6)];
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    die1.classList.remove('rolling');
                    die2.classList.remove('rolling');
                    die1.innerText = faces[d1 - 1];
                    die2.innerText = faces[d2 - 1];
                }
            }, 50);
        }
        
        function renderGame() {
            if (!gameData) return;
            
            const playersDiv = document.getElementById('playersStats');
            playersDiv.innerHTML = Object.values(gameData.players).map(p => `
                <div class="player-card ${gameData.currentTurn === p.id ? 'active' : ''}" style="border-left-color: ${p.color}">
                    <div class="player-avatar" style="background: ${p.color}20">${p.emoji}</div>
                    <div class="player-name">${p.name}</div>
                    <div class="player-money">💰 ${p.money}</div>
                </div>
            `).join('');
            
            const currentPlayer = gameData.players[gameData.currentTurn];
            const isMyTurn = gameData.currentTurn === myPlayerId;
            document.getElementById('turnBadge').innerHTML = isMyTurn ? '🎲 TURA TA' : `⏳ Rândul lui ${currentPlayer?.name || '?'}`;
            
            const rollBtn = document.getElementById('rollBtn');
            const endBtn = document.getElementById('endTurnBtn');
            if (isMyTurn && !gameData.hasRolled) { rollBtn.disabled = false; endBtn.disabled = true; }
            else if (isMyTurn && gameData.hasRolled) { rollBtn.disabled = true; endBtn.disabled = false; }
            else { rollBtn.disabled = true; endBtn.disabled = true; }
            
            const boardDiv = document.getElementById('board');
            const players = gameData.players;
            boardDiv.innerHTML = TILES.map((tile, idx) => {
                const playersOnTile = Object.values(players).filter(p => p.position === idx);
                const owner = gameData.properties[idx]?.owner;
                const ownerName = owner ? players[owner]?.name : null;
                return `
                    <div class="tile" onclick="showTileInfo(${idx})">
                        <div class="tile-number">${idx + 1}</div>
                        <div class="tile-color" style="background: ${tile.color}"></div>
                        <div class="tile-info">
                            <div class="tile-name">${tile.name}</div>
                            <div class="tile-owner">${ownerName ? `👑 ${ownerName}` : tile.price > 0 ? `💰 ${tile.price} RON` : '📌'}</div>
                        </div>
                        <div class="tile-players">${playersOnTile.map(p => `<div class="tile-player-dot" style="background: ${p.color}" title="${p.name}"></div>`).join('')}</div>
                    </div>
                `;
            }).join('');
            
            const logDiv = document.getElementById('gameLog');
            if (gameData.log) logDiv.innerHTML = gameData.log.map(l => `<div class="log-entry">${l}</div>`).join('');
        }
        
        function showTileInfo(tileId) {
            const tile = TILES[tileId];
            const owner = gameData?.properties[tileId]?.owner;
            const ownerName = owner ? gameData?.players[owner]?.name : "Nimeni";
            showModal(tile.name, `Preț: ${tile.price} RON\nProprietar: ${ownerName}`, [{ text: "Închide", action: closeModal }]);
        }
    </script>
</body>
</html>
